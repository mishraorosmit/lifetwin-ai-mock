<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — LifeTwin AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../CSS/main.css">
    <link rel="stylesheet" href="../CSS/components.css">
    <link rel="stylesheet" href="../CSS/auth.css">
</head>

<body>

    <div class="auth-layout">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-card__logo">
                <div class="public-nav__brand-logo">LT</div>
                <span class="public-nav__brand-name">LifeTwin <span>AI</span></span>
            </div>

            <h2 class="text-center mb-2" style="font-size:var(--fs-xl);">Welcome back</h2>
            <p class="text-center text-sm" style="margin-bottom:var(--sp-8);">Sign in to access your digital health twin
            </p>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.com" required
                        autocomplete="email">
                </div>
                <div class="form-group">
                    <div class="d-flex justify-between items-center mb-2">
                        <label class="form-label" for="password" style="margin-bottom:0;">Password</label>
                        <a href="#" class="text-sm text-forest">Forgot password?</a>
                    </div>
                    <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
                </div>
                <div class="form-group">
                    <label class="form-check">
                        <input type="checkbox">
                        <span class="form-check__label">Remember me for 30 days</span>
                    </label>
                </div>
                <button type="button" class="btn btn--primary btn--block btn--lg"
                    onclick="window.location.href='dashboard.html'">Sign In</button>
                <div class="form-divider">or</div>
                <p class="text-center text-sm" style="margin-bottom:0;">
                    Don't have an account? <a href="signup.html" class="fw-semi">Create one</a>
                </p>
            </form>
        </div>
    </div>

</body>

</html>
