<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — LifeTwin AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../CSS/main.css">
    <link rel="stylesheet" href="../CSS/components.css">
    <link rel="stylesheet" href="../CSS/auth.css">
</head>

<body>

    <div class="auth-layout">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-card__logo">
                <div class="public-nav__brand-logo">LT</div>
                <span class="public-nav__brand-name">LifeTwin <span>AI</span></span>
            </div>

            <h2 class="text-center mb-2" style="font-size:var(--fs-xl);">Create your account</h2>
            <p class="text-center text-sm" style="margin-bottom:var(--sp-8);">Start building your digital health twin
                today</p>

            <!-- Signup Form -->
            <form id="signupForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label form-label--required" for="firstName">First Name</label>
                        <input type="text" class="form-input" id="firstName" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label form-label--required" for="lastName">Last Name</label>
                        <input type="text" class="form-input" id="lastName" placeholder="Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label form-label--required" for="email">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label form-label--required" for="password">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Minimum 8 characters" required
                        minlength="8">
                    <span class="form-hint">Must be at least 8 characters with one number</span>
                </div>
                <div class="form-group">
                    <label class="form-label form-label--required" for="confirmPassword">Confirm Password</label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="Repeat your password"
                        required>
                </div>
                <div class="form-group">
                    <label class="form-check">
                        <input type="checkbox" required>
                        <span class="form-check__label">I agree to the <a href="#">Terms</a> and <a href="#">Privacy
                                Policy</a></span>
                    </label>
                </div>
                <button type="button" class="btn btn--primary btn--block btn--lg"
                    onclick="window.location.href='dashboard.html'">Create Account</button>
                <div class="form-divider">or</div>
                <p class="text-center text-sm" style="margin-bottom:0;">
                    Already have an account? <a href="login.html" class="fw-semi">Sign in</a>
                </p>
            </form>
        </div>
    </div>

</body>

</html>
